name: CodeRabbit PR automation

on:
  workflow_call:
    inputs:
      pr_number:
        description: Pull request number to inspect
        required: true
        type: number
      run_validation:
        description: Whether to run validation after remediation
        required: false
        type: boolean
        default: false
      working_tree_must_be_clean:
        description: Whether the target checkout must be clean before remediation
        required: false
        type: boolean
        default: true
      max_cycles:
        description: Maximum bounded remediation cycles allowed by the artifact constraints
        required: false
        type: number
        default: 3
      python_version:
        description: Python version used for normalization and validators
        required: false
        type: string
        default: '3.11'
      runner_labels_json:
        description: JSON-encoded runs-on value, for example "[\"self-hosted\"]" or "[\"self-hosted\",\"linux\"]"
        required: false
        type: string
        default: '["self-hosted"]'
      target_checkout_path:
        description: Relative checkout path for the consumer repository inside github.workspace
        required: false
        type: string
        default: target
      shared_checkout_path:
        description: Relative checkout path for the shared repo inside github.workspace
        required: false
        type: string
        default: _shared
      shared_repository:
        description: Owner and repository of the shared toolkit repo
        required: false
        type: string
        default: fr-meyer/agent-toolkit
      shared_repository_ref:
        description: Branch, tag, or SHA to use for the shared toolkit checkout
        required: false
        type: string
        default: main
      agent_runtime:
        description: Which coding-agent runtime to prepare before the bounded agent pass
        required: false
        type: string
        default: none
      agent_command_json:
        description: Preferred JSON-array command template for the bounded agent pass
        required: false
        type: string
        default: ''
      agent_command:
        description: Fallback string command template for the bounded agent pass
        required: false
        type: string
        default: ''
      coderabbit_cli:
        description: Optional path or binary name override for the CodeRabbit CLI used during validation
        required: false
        type: string
        default: ''
      cursor_cli:
        description: Optional path or binary name override for the Cursor CLI used during agent setup
        required: false
        type: string
        default: ''
      install_shared_skills:
        description: Whether to install shared Agent Skills into the target repository before agent execution
        required: false
        type: boolean
        default: true
      install_cursor_rules:
        description: Whether to install shared Cursor rules into the target repository before agent execution
        required: false
        type: boolean
        default: true
      shared_skills_install_mode:
        description: Install mode for shared Agent Skills and Cursor rules
        required: false
        type: string
        default: copy
      auto_commit:
        description: Whether to create local Git commit(s) after a successful remediation pass
        required: false
        type: boolean
        default: false
      commit_strategy:
        description: Commit strategy for post-remediation Git save
        required: false
        type: string
        default: single-commit
      commit_count_mode:
        description: Commit-count control for split-by-scope mode
        required: false
        type: string
        default: auto
      fixed_commit_count:
        description: Number of commit groups to execute when commit_count_mode is fixed
        required: false
        type: number
        default: 1
      stop_on_ambiguous_remainder:
        description: Whether to stop without forcing ambiguous leftover changes into commits
        required: false
        type: boolean
        default: true
      install_agent_runtime:
        description: Whether the workflow should install and prepare the selected agent runtime
        required: false
        type: boolean
        default: true
      install_validation_runtime:
        description: Whether the workflow should install and authenticate the CodeRabbit CLI when validation is enabled
        required: false
        type: boolean
        default: true
    secrets:
      GH_TOKEN:
        required: true
      CURSOR_API_KEY:
        required: false
      CODERABBIT_API_KEY:
        required: false

jobs:
  coderabbit-pr-automation:
    name: CodeRabbit PR automation
    runs-on: ${{ fromJSON(inputs.runner_labels_json) }}
    permissions:
      contents: read
      pull-requests: read
      actions: read

    env:
      PR_NUMBER: ${{ inputs.pr_number }}
      RUN_VALIDATION: ${{ inputs.run_validation }}
      WORKING_TREE_MUST_BE_CLEAN: ${{ inputs.working_tree_must_be_clean }}
      MAX_CYCLES: ${{ inputs.max_cycles }}
      TARGET_CHECKOUT_PATH: ${{ inputs.target_checkout_path }}
      SHARED_CHECKOUT_PATH: ${{ inputs.shared_checkout_path }}
      SHARED_REPOSITORY: ${{ inputs.shared_repository }}
      SHARED_REPOSITORY_REF: ${{ inputs.shared_repository_ref }}
      AGENT_RUNTIME: ${{ inputs.agent_runtime }}
      CODERABBIT_AGENT_COMMAND_JSON: ${{ inputs.agent_command_json }}
      CODERABBIT_AGENT_COMMAND: ${{ inputs.agent_command }}
      CODERABBIT_CLI: ${{ inputs.coderabbit_cli }}
      CURSOR_CLI: ${{ inputs.cursor_cli }}
      INSTALL_SHARED_SKILLS: ${{ inputs.install_shared_skills }}
      INSTALL_CURSOR_RULES: ${{ inputs.install_cursor_rules }}
      SHARED_SKILLS_INSTALL_MODE: ${{ inputs.shared_skills_install_mode }}
      AUTO_COMMIT: ${{ inputs.auto_commit }}
      COMMIT_STRATEGY: ${{ inputs.commit_strategy }}
      COMMIT_COUNT_MODE: ${{ inputs.commit_count_mode }}
      FIXED_COMMIT_COUNT: ${{ inputs.fixed_commit_count }}
      STOP_ON_AMBIGUOUS_REMAINDER: ${{ inputs.stop_on_ambiguous_remainder }}
      CODERABBIT_OUT_DIR: ${{ github.workspace }}/${{ inputs.target_checkout_path }}/.coderabbit/out

    steps:
      - name: Checkout consumer repository
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ inputs.pr_number }}/head
          path: ${{ inputs.target_checkout_path }}
          fetch-depth: 0

      - name: Checkout shared toolkit repository
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.shared_repository }}
          ref: ${{ inputs.shared_repository_ref }}
          path: ${{ inputs.shared_checkout_path }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}

      - name: Prepare output directories
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$CODERABBIT_OUT_DIR"

      - name: Fetch raw PR review-thread data
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          set -euo pipefail
          bash "$SHARED_CHECKOUT_PATH/scripts/coderabbit/fetch_threads.sh" \
            --repo-path "$GITHUB_WORKSPACE/$TARGET_CHECKOUT_PATH" \
            --repo-name "$GITHUB_REPOSITORY" \
            --pr-number "$PR_NUMBER" \
            --out-dir "$CODERABBIT_OUT_DIR"

      - name: Normalize actionable CodeRabbit issues
        shell: bash
        run: |
          set -euo pipefail
          python "$SHARED_CHECKOUT_PATH/scripts/coderabbit/normalize_threads.py" \
            --repo-path "$GITHUB_WORKSPACE/$TARGET_CHECKOUT_PATH" \
            --in-dir "$CODERABBIT_OUT_DIR" \
            --out-dir "$CODERABBIT_OUT_DIR" \
            --max-cycles "$MAX_CYCLES" \
            --working-tree-must-be-clean "$WORKING_TREE_MUST_BE_CLEAN"

      - name: Validate normalized issue artifact
        shell: bash
        run: |
          set -euo pipefail
          python "$SHARED_CHECKOUT_PATH/skills/coderabbit-pr-automation/scripts/validate-issue-artifact.py" \
            "$CODERABBIT_OUT_DIR/actionable-issues.json"

      - name: Count actionable issues
        id: issue_count
        shell: bash
        run: |
          set -euo pipefail
          ISSUE_COUNT=$(python -c "import json, pathlib; print(len(json.loads(pathlib.Path(r'$CODERABBIT_OUT_DIR/actionable-issues.json').read_text(encoding='utf-8'))['issues']))")
          echo "count=$ISSUE_COUNT" >> "$GITHUB_OUTPUT"
          echo "Actionable issue count: $ISSUE_COUNT"

      - name: Preflight target checkout
        if: steps.issue_count.outputs.count != '0'
        shell: bash
        run: |
          set -euo pipefail
          bash "$SHARED_CHECKOUT_PATH/scripts/coderabbit/preflight.sh" \
            --repo-path "$GITHUB_WORKSPACE/$TARGET_CHECKOUT_PATH" \
            --artifact-path "$CODERABBIT_OUT_DIR/actionable-issues.json" \
            --expected-repository "$GITHUB_REPOSITORY" \
            --working-tree-must-be-clean "$WORKING_TREE_MUST_BE_CLEAN" \
            --out-dir "$CODERABBIT_OUT_DIR"

      - name: Harden secret masking
        if: steps.issue_count.outputs.count != '0'
        shell: bash
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          CODERABBIT_API_KEY: ${{ secrets.CODERABBIT_API_KEY }}
        run: |
          set -euo pipefail
          if [[ -n "${CURSOR_API_KEY:-}" ]]; then
            echo "::add-mask::$CURSOR_API_KEY"
          fi
          if [[ -n "${CODERABBIT_API_KEY:-}" ]]; then
            echo "::add-mask::$CODERABBIT_API_KEY"
          fi

      - name: Set up selected agent runtime
        if: steps.issue_count.outputs.count != '0' && inputs.install_agent_runtime && inputs.agent_runtime != 'none'
        shell: bash
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: |
          set -euo pipefail
          bash "$SHARED_CHECKOUT_PATH/scripts/coderabbit/setup_agent_runtime.sh" "$AGENT_RUNTIME"

      - name: Set up CodeRabbit CLI
        if: steps.issue_count.outputs.count != '0' && inputs.run_validation && inputs.install_validation_runtime
        shell: bash
        env:
          CODERABBIT_API_KEY: ${{ secrets.CODERABBIT_API_KEY }}
        run: |
          set -euo pipefail
          bash "$SHARED_CHECKOUT_PATH/scripts/coderabbit/setup_coderabbit_cli.sh"

      - name: Prepare shared agent context
        if: steps.issue_count.outputs.count != '0'
        shell: bash
        run: |
          set -euo pipefail
          bash "$SHARED_CHECKOUT_PATH/scripts/coderabbit/prepare_agent_context.sh" \
            --repo-path "$GITHUB_WORKSPACE/$TARGET_CHECKOUT_PATH" \
            --shared-root "$GITHUB_WORKSPACE/$SHARED_CHECKOUT_PATH" \
            --out-dir "$CODERABBIT_OUT_DIR" \
            --install-shared-skills "$INSTALL_SHARED_SKILLS" \
            --install-cursor-rules "$INSTALL_CURSOR_RULES" \
            --install-mode "$SHARED_SKILLS_INSTALL_MODE"

      - name: Run bounded remediation orchestrator
        if: steps.issue_count.outputs.count != '0'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: |
          set -euo pipefail
          bash "$SHARED_CHECKOUT_PATH/scripts/coderabbit/orchestrate.sh" \
            --repo-path "$GITHUB_WORKSPACE/$TARGET_CHECKOUT_PATH" \
            --shared-root "$GITHUB_WORKSPACE/$SHARED_CHECKOUT_PATH" \
            --pr-number "$PR_NUMBER" \
            --run-validation "$RUN_VALIDATION" \
            --out-dir "$CODERABBIT_OUT_DIR"

      - name: Run post-remediation commit pass
        if: steps.issue_count.outputs.count != '0' && inputs.auto_commit
        shell: bash
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: |
          set -euo pipefail
          bash "$SHARED_CHECKOUT_PATH/scripts/coderabbit/run_commit_pass.sh" \
            --repo-path "$GITHUB_WORKSPACE/$TARGET_CHECKOUT_PATH" \
            --shared-root "$GITHUB_WORKSPACE/$SHARED_CHECKOUT_PATH" \
            --pr-number "$PR_NUMBER" \
            --out-dir "$CODERABBIT_OUT_DIR" \
            --commit-strategy "$COMMIT_STRATEGY" \
            --commit-count-mode "$COMMIT_COUNT_MODE" \
            --fixed-commit-count "$FIXED_COMMIT_COUNT" \
            --stop-on-ambiguous-remainder "$STOP_ON_AMBIGUOUS_REMAINDER"

      - name: Upload CodeRabbit workflow artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coderabbit-pr-automation-${{ inputs.pr_number }}
          path: ${{ env.CODERABBIT_OUT_DIR }}
          if-no-files-found: warn
