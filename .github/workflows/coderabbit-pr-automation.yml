name: CodeRabbit PR automation

on:
  workflow_call:
    inputs:
      pr_number:
        description: Pull request number to inspect
        required: true
        type: number
      run_validation:
        description: Whether to run validation after remediation
        required: false
        type: boolean
        default: true
      working_tree_must_be_clean:
        description: Whether the target checkout must be clean before remediation
        required: false
        type: boolean
        default: true
      max_cycles:
        description: Maximum bounded remediation cycles allowed by the artifact constraints
        required: false
        type: number
        default: 3
      python_version:
        description: Python version used for normalization and validators
        required: false
        type: string
        default: '3.11'
      runner_labels_json:
        description: JSON-encoded runs-on value, for example "[\"self-hosted\"]" or "[\"self-hosted\",\"linux\"]"
        required: false
        type: string
        default: '["self-hosted"]'
      target_checkout_path:
        description: Relative checkout path for the consumer repository inside github.workspace
        required: false
        type: string
        default: target
      shared_checkout_path:
        description: Relative checkout path for the shared repo inside github.workspace
        required: false
        type: string
        default: _shared
      shared_repository:
        description: Owner and repository of the shared toolkit repo
        required: false
        type: string
        default: fr-meyer/agent-toolkit
      shared_repository_ref:
        description: Branch, tag, or SHA to use for the shared toolkit checkout
        required: false
        type: string
        default: main
      agent_command_json:
        description: Preferred JSON-array command template for the bounded agent pass
        required: false
        type: string
        default: ''
      agent_command:
        description: Fallback string command template for the bounded agent pass
        required: false
        type: string
        default: ''
      coderabbit_cli:
        description: Optional path or binary name override for the CodeRabbit CLI used during validation
        required: false
        type: string
        default: ''
    secrets:
      GH_TOKEN:
        required: true

jobs:
  coderabbit-pr-automation:
    name: CodeRabbit PR automation
    runs-on: ${{ fromJSON(inputs.runner_labels_json) }}
    permissions:
      contents: read
      pull-requests: read
      actions: read

    env:
      PR_NUMBER: ${{ inputs.pr_number }}
      RUN_VALIDATION: ${{ inputs.run_validation }}
      WORKING_TREE_MUST_BE_CLEAN: ${{ inputs.working_tree_must_be_clean }}
      MAX_CYCLES: ${{ inputs.max_cycles }}
      TARGET_CHECKOUT_PATH: ${{ inputs.target_checkout_path }}
      SHARED_CHECKOUT_PATH: ${{ inputs.shared_checkout_path }}
      SHARED_REPOSITORY: ${{ inputs.shared_repository }}
      SHARED_REPOSITORY_REF: ${{ inputs.shared_repository_ref }}
      CODERABBIT_AGENT_COMMAND_JSON: ${{ inputs.agent_command_json }}
      CODERABBIT_AGENT_COMMAND: ${{ inputs.agent_command }}
      CODERABBIT_CLI: ${{ inputs.coderabbit_cli }}
      CODERABBIT_OUT_DIR: ${{ github.workspace }}/${{ inputs.target_checkout_path }}/.coderabbit/out

    steps:
      - name: Checkout consumer repository
        uses: actions/checkout@v4
        with:
          path: ${{ inputs.target_checkout_path }}
          fetch-depth: 0

      - name: Checkout shared toolkit repository
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.shared_repository }}
          ref: ${{ inputs.shared_repository_ref }}
          path: ${{ inputs.shared_checkout_path }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}

      - name: Prepare output directories
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$CODERABBIT_OUT_DIR"

      - name: Fetch raw PR review-thread data
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          set -euo pipefail
          bash "$SHARED_CHECKOUT_PATH/scripts/coderabbit/fetch_threads.sh" \
            --repo-path "$GITHUB_WORKSPACE/$TARGET_CHECKOUT_PATH" \
            --repo-name "$GITHUB_REPOSITORY" \
            --pr-number "$PR_NUMBER" \
            --out-dir "$CODERABBIT_OUT_DIR"

      - name: Normalize actionable CodeRabbit issues
        shell: bash
        run: |
          set -euo pipefail
          python "$SHARED_CHECKOUT_PATH/scripts/coderabbit/normalize_threads.py" \
            --repo-path "$GITHUB_WORKSPACE/$TARGET_CHECKOUT_PATH" \
            --in-dir "$CODERABBIT_OUT_DIR" \
            --out-dir "$CODERABBIT_OUT_DIR" \
            --max-cycles "$MAX_CYCLES" \
            --working-tree-must-be-clean "$WORKING_TREE_MUST_BE_CLEAN"

      - name: Validate normalized issue artifact
        shell: bash
        run: |
          set -euo pipefail
          python "$SHARED_CHECKOUT_PATH/skills/coderabbit-pr-automation/scripts/validate-issue-artifact.py" \
            "$CODERABBIT_OUT_DIR/actionable-issues.json"

      - name: Count actionable issues
        id: issue_count
        shell: bash
        run: |
          set -euo pipefail
          ISSUE_COUNT=$(python -c "import json, pathlib; print(len(json.loads(pathlib.Path(r'$CODERABBIT_OUT_DIR/actionable-issues.json').read_text(encoding='utf-8'))['issues']))")
          echo "count=$ISSUE_COUNT" >> "$GITHUB_OUTPUT"
          echo "Actionable issue count: $ISSUE_COUNT"

      - name: Preflight target checkout
        if: steps.issue_count.outputs.count != '0'
        shell: bash
        run: |
          set -euo pipefail
          bash "$SHARED_CHECKOUT_PATH/scripts/coderabbit/preflight.sh" \
            --repo-path "$GITHUB_WORKSPACE/$TARGET_CHECKOUT_PATH" \
            --artifact-path "$CODERABBIT_OUT_DIR/actionable-issues.json" \
            --expected-repository "$GITHUB_REPOSITORY" \
            --working-tree-must-be-clean "$WORKING_TREE_MUST_BE_CLEAN" \
            --out-dir "$CODERABBIT_OUT_DIR"

      - name: Run bounded remediation orchestrator
        if: steps.issue_count.outputs.count != '0'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          set -euo pipefail
          bash "$SHARED_CHECKOUT_PATH/scripts/coderabbit/orchestrate.sh" \
            --repo-path "$GITHUB_WORKSPACE/$TARGET_CHECKOUT_PATH" \
            --shared-root "$GITHUB_WORKSPACE/$SHARED_CHECKOUT_PATH" \
            --pr-number "$PR_NUMBER" \
            --run-validation "$RUN_VALIDATION" \
            --out-dir "$CODERABBIT_OUT_DIR"

      - name: Upload CodeRabbit workflow artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coderabbit-pr-automation-${{ inputs.pr_number }}
          path: ${{ env.CODERABBIT_OUT_DIR }}
          if-no-files-found: warn
