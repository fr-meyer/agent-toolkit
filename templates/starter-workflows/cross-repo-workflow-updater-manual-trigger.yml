name: Cross-repo workflow updater (manual trigger)

on:
  workflow_dispatch:
    inputs:
      source_commit:
        description: Shared repo source commit to distribute from (blank uses current HEAD)
        required: false
        type: string
        default: ''
      previous_source_commit:
        description: Previous shared repo source commit for diffing (blank uses the source commit parent)
        required: false
        type: string
        default: ''
      create_pr:
        description: Open PRs in consumer repos when candidate updates exist
        required: false
        type: boolean
        default: true
      dry_run:
        description: Preview only, do not write consumer repos or open PRs
        required: false
        type: boolean
        default: false
      manual_review_on_divergence:
        description: Allow manual-review output when exact-managed consumer workflows diverge
        required: false
        type: boolean
        default: true
      manual_review_delivery:
        description: How divergence review should be delivered
        required: false
        type: choice
        default: pr-comment
        options:
          - pr-comment
          - commit-artifacts
      include_normalization_patch:
        description: Include optional normalization patch in divergence review output
        required: false
        type: boolean
        default: true
      branch_prefix:
        description: Updater branch prefix used in consumer repos
        required: false
        type: string
        default: chore/sync-shared-workflows-
      consumer_local_root:
        description: Local directory where consumer repositories will be cloned
        required: false
        type: string
        default: .tmp/cross-repo-workflow-updater/consumers
      python_version:
        description: Python version used for the helper steps
        required: false
        type: string
        default: '3.11'
      consumer_filter:
        description: Optional newline or comma separated repo slug filter
        required: false
        type: string
        default: ''
      starter_template_filter:
        description: Optional newline or comma separated starter template filter
        required: false
        type: string
        default: ''

permissions:
  contents: read
  actions: read

concurrency:
  group: cross-repo-workflow-updater-dispatch-${{ github.ref }}
  cancel-in-progress: true

jobs:
  updater:
    uses: ./.github/workflows/cross-repo-workflow-updater-reusable.yml
    with:
      source_commit: ${{ inputs.source_commit }}
      previous_source_commit: ${{ inputs.previous_source_commit }}
      create_pr: ${{ inputs.create_pr }}
      dry_run: ${{ inputs.dry_run }}
      manual_review_on_divergence: ${{ inputs.manual_review_on_divergence }}
      manual_review_delivery: ${{ inputs.manual_review_delivery }}
      include_normalization_patch: ${{ inputs.include_normalization_patch }}
      branch_prefix: ${{ inputs.branch_prefix }}
      consumer_local_root: ${{ inputs.consumer_local_root }}
      python_version: ${{ inputs.python_version }}
      consumer_filter: ${{ inputs.consumer_filter }}
      starter_template_filter: ${{ inputs.starter_template_filter }}
    secrets:
      ELEVATED_GITHUB_TOKEN: ${{ secrets.ELEVATED_GITHUB_TOKEN }}
